<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TasteMap</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        width: 300px;
        background: #0a0a0a;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .wrap {
        padding: 16px;
      }
      h1 {
        font-size: 14px;
        font-weight: 500;
        margin: 0 0 12px;
        letter-spacing: -0.01em;
      }
      #preview {
        width: 100%;
        aspect-ratio: 16 / 10;
        object-fit: cover;
        border-radius: 12px;
        background: #1a1a1a;
        display: block;
        margin-bottom: 10px;
      }
      #title {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
        margin: 0 0 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      textarea {
        width: 100%;
        box-sizing: border-box;
        resize: none;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        color: #fff;
        padding: 8px 10px;
        font-size: 12px;
        font-family: inherit;
        margin-bottom: 10px;
      }
      button {
        width: 100%;
        border: none;
        border-radius: 999px;
        padding: 9px 0;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
      }
      #save {
        background: #fff;
        color: #000;
      }
      #save:disabled {
        opacity: 0.5;
        cursor: default;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        box-sizing: border-box;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        color: #fff;
        padding: 8px 10px;
        font-size: 12px;
        font-family: inherit;
        margin-bottom: 10px;
      }
      #connect {
        background: #fff;
        color: #000;
      }
      #status {
        font-size: 11px;
        text-align: center;
        margin-top: 8px;
        color: rgba(255, 255, 255, 0.4);
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Save to TasteMap</h1>

      <div id="setup" class="hidden">
        <input id="apiKey" type="password" placeholder="API key from .env.local" />
        <button id="connect">Save key</button>
        <p id="status">Set once — matches TASTEMAP_API_KEY on your server.</p>
      </div>

      <div id="signedIn" class="hidden">
        <img id="preview" alt="" />
        <p id="title"></p>
        <textarea id="note" rows="2" placeholder="Add a note (optional)"></textarea>
        <button id="save">Save</button>
        <p id="status"></p>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
